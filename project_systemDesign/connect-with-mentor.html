<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log In - MentorHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
     <style>
    body {
     
       font-family: Arial, sans-serif;
            background: linear-gradient(115deg, rgba(98, 201, 236, .22), rgba(167, 237, 39, .18));
            min-height: 100vh;
    }

    .schedule-box {
      background: white;
      padding: 25px;
      border-radius: 10px;
      max-width: 850px;
      margin: 40px auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.08);
    }

    .title {
      font-weight: bold;
      font-size: 26px;
      color: #318b31;
      margin-bottom: 20px;
    }

    /* Calendar */
    .calendar-box {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-weight: bold;
      font-size: 13px;
      margin-bottom: 10px;
      color: #555;
    }

    .calendar-dates {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      text-align: center;
    }

    .calendar-dates span {
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    .calendar-dates span:hover {
      background: #d7f3d7;
    }

    .calendar-dates span.active {
      background: #3ca64c;
      color: white;
      font-weight: bold;
    }

    .calendar-dates span.light {
      background: #c8efc8;
      font-weight: bold;
    }

    .calendar-dates span.disabled {
      opacity: 0.3;
      pointer-events: none;
      cursor: default;
    }

    /* Time slots */
    .time-slot {
      border: 2px solid #c8efc8;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      background: white;
    }

    .time-slot:hover {
      border-color: #c8efc8;
    }

    .time-slot.active {
      border-color: #c8efc8;
      background: #c8efc8;
    }

    /* Inputs */
    .form-control {
      border-radius: 8px;
      padding: 12px;
    }

    /* Button */
    .btn-orange {
      background: #50bc29;
      border: none;
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      width: 100%;
      color: white;
      transition: 0.2s;
    }

    .btn-orange:hover {
      background: #39861d;
    }

    .selected-info {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 15px;
      border: 1px solid #ddd;
    }

    @media (max-width: 768px) {
      .schedule-box {
        padding: 18px;
      }
    }
  </style>
</head>

<body>

  <div class="schedule-box">
    <h2 class="title">Select Your Session Time</h2>

    <!-- Calendar + Time slots -->
    <div class="row g-4">

      <!-- Calendar -->
      <div class="col-lg-6 col-md-12">
        <div class="calendar-box">
          <div class="calendar-header">
            <span style="cursor:pointer;">&#8592;</span>
            <span id="monthName">September</span>
            <span style="cursor:pointer;">&#8594;</span>
          </div>

          <div class="calendar-days">
            <div>Su</div>
            <div>Mo</div>
            <div>Tu</div>
            <div>We</div>
            <div>Th</div>
            <div>Fr</div>
            <div>Sa</div>
          </div>

          <div class="calendar-dates" id="calendarDates">
            <span class="disabled"></span>
            <span class="disabled"></span>
            <span class="disabled"></span>

            <span>1</span>
            <span>2</span>
            <span class="light">3</span>
            <span class="light">4</span>

            <span>5</span>
            <span>6</span>
            <span>7</span>
            <span class="light">8</span>
            <span class="active">9</span>
            <span class="light">10</span>
            <span class="light">11</span>

            <span class="light">12</span>
            <span class="light">13</span>
            <span class="light">14</span>
            <span>15</span>
            <span>16</span>
            <span>17</span>
            <span>18</span>

            <span>19</span>
            <span>20</span>
            <span>21</span>
            <span>22</span>
            <span>23</span>
            <span>24</span>
            <span>25</span>

            <span>26</span>
            <span>27</span>
            <span>28</span>
            <span>29</span>
            <span>30</span>

            <span class="disabled"></span>
            <span class="disabled"></span>
          </div>
        </div>
      </div>

      <!-- Time Slots -->
      <div class="col-lg-6 col-md-12">
        <h5 class="fw-bold mb-3">Time Slots</h5>

        <div class="row g-3" id="timeSlots">
          <div class="col-6">
            <div class="time-slot active">9:00 AM</div>
          </div>
          <div class="col-6">
            <div class="time-slot">11:00 AM</div>
          </div>
          <div class="col-6">
            <div class="time-slot">1:00 PM</div>
          </div>
          <div class="col-6">
            <div class="time-slot">3:00 PM</div>
          </div>
        </div>
      </div>

    </div>

    <!-- Selected info -->
    <div class="selected-info" id="selectedInfo">
      <b>Selected Date:</b> <span id="selectedDate">9</span> September <br>
      <b>Selected Time:</b> <span id="selectedTime">9:00 AM</span>
    </div>

    <!-- Form -->
    <p class="mt-4 fw-bold">Select date and time</p>

    <div class="row g-3">
      <div class="col-md-6 col-12">
        <label class="fw-bold">Full Name</label>
        <input type="text" class="form-control" id="fullName" placeholder="">
      </div>

      <div class="col-md-6 col-12">
        <label class="fw-bold">Email</label>
        <input type="email" class="form-control" id="email" placeholder="">
      </div>

      <div class="col-md-6 col-12">
        <label class="fw-bold mt-2">Add Promo Code</label>
        <input type="text" class="form-control" id="promoCode" placeholder="Add Promo Code">
      </div>
    </div>

    <!-- Button -->
    <div class="mt-4">
      <button class="btn-orange" id="scheduleBtn">Schedule Session</button>
    </div>

  </div>


  <!-- JavaScript -->
  <script>
    // Select Date
    const calendarDates = document.querySelectorAll("#calendarDates span");
    const selectedDate = document.getElementById("selectedDate");

    calendarDates.forEach(date => {
      date.addEventListener("click", () => {
        if (date.classList.contains("disabled")) return;

        calendarDates.forEach(d => d.classList.remove("active"));
        date.classList.add("active");
        selectedDate.textContent = date.textContent;
      });
    });

    // Select Time Slot
    const timeSlots = document.querySelectorAll(".time-slot");
    const selectedTime = document.getElementById("selectedTime");

    timeSlots.forEach(slot => {
      slot.addEventListener("click", () => {
        timeSlots.forEach(s => s.classList.remove("active"));
        slot.classList.add("active");
        selectedTime.textContent = slot.textContent;
      });
    });

    // Button Click
    const scheduleBtn = document.getElementById("scheduleBtn");
    const fullNameInput = document.getElementById("fullName");
    const emailInput = document.getElementById("email");
    const promoCodeInput = document.getElementById("promoCode");

    scheduleBtn.addEventListener("click", async () => {
      const sessionData = {
        fullName: fullNameInput.value.trim(),
        email: emailInput.value.trim(),
        promoCode: promoCodeInput.value.trim(),
        sessionDate: selectedDate.textContent.trim(),
        sessionMonth: "September",
        sessionTime: selectedTime.textContent.trim()
      };

      if (!sessionData.fullName || !sessionData.email) {
        alert("Please enter your full name and email before scheduling the session.");
        return;
      }

      const formData = new URLSearchParams(sessionData);

      try {
        const response = await fetch("Api/Session.ashx", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: formData.toString()
        });

        if (!response.ok) throw new Error("Session request failed");

        const result = await response.json();
        if (!result.success) throw new Error(result.error || "Session request failed");

        localStorage.setItem("mentorhubLastSession", JSON.stringify(sessionData));
        window.location.href = "session-confirmation.html";
      } catch (error) {
        localStorage.setItem("mentorhubLastSession", JSON.stringify(sessionData));
        window.location.href = "session-confirmation.html";
      }
    });
  </script>

</body>
</html>
