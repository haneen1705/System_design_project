<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Session Confirmation - MentorHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(115deg, rgba(98, 201, 236, .22), rgba(167, 237, 39, .18));
      min-height: 100vh;
    }
    .confirmation-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 850px;
      margin: 40px auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.08);
    }
    .success-icon {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #c8efc8;
      color: #318b31;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin-bottom: 15px;
    }
    .title {
      font-weight: bold;
      font-size: 26px;
      color: #318b31;
      margin-bottom: 10px;
    }
    .details-card {
      background: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 18px;
      margin-top: 20px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      padding: 10px 0;
      border-bottom: 1px solid #e5e5e5;
    }
    .detail-row:last-child {
      border-bottom: 0;
    }
    .detail-label {
      font-weight: bold;
      color: #555;
    }
    .detail-value {
      color: #222;
      text-align: right;
    }
    .btn-green {
      background: #50bc29;
      border: none;
      padding: 12px 22px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      display: inline-block;
      transition: 0.2s;
    }
    .btn-green:hover {
      background: #39861d;
      color: white;
    }
    .btn-light-custom {
      background: white;
      border: 1px solid #c8efc8;
      padding: 12px 22px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      color: #318b31;
      text-decoration: none;
      display: inline-block;
      transition: 0.2s;
    }
    .btn-light-custom:hover {
      background: #c8efc8;
      color: #318b31;
    }
    @media (max-width: 768px) {
      .confirmation-box { padding: 22px; }
      .detail-row { flex-direction: column; gap: 4px; }
      .detail-value { text-align: left; }
      .btn-green, .btn-light-custom { width: 100%; text-align: center; margin-bottom: 10px; }
    }
  </style>
</head>
<body>
  <div class="confirmation-box">
    <div class="success-icon"><i class="bi bi-check2"></i></div>
    <h2 class="title">Session Scheduled Successfully</h2>
    <p class="mb-0 text-muted">Your mentorship session request has been received. Here are the booking details.</p>

    <div class="details-card">
      <div class="detail-row"><span class="detail-label">Full Name</span><span class="detail-value" id="confirmName">-</span></div>
      <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value" id="confirmEmail">-</span></div>
      <div class="detail-row"><span class="detail-label">Date</span><span class="detail-value" id="confirmDate">-</span></div>
      <div class="detail-row"><span class="detail-label">Time</span><span class="detail-value" id="confirmTime">-</span></div>
      <div class="detail-row"><span class="detail-label">Promo Code</span><span class="detail-value" id="confirmPromo">-</span></div>
    </div>

    <div class="mt-4">
      <a class="btn-green me-2" href="index.html">Back to Home</a>
      <a class="btn-light-custom" href="explore.html">Explore More Mentors</a>
    </div>
  </div>

  <script>
    const sessionData = JSON.parse(localStorage.getItem("mentorhubLastSession") || "{}");
    document.getElementById("confirmName").textContent = sessionData.fullName || "-";
    document.getElementById("confirmEmail").textContent = sessionData.email || "-";
    document.getElementById("confirmDate").textContent = sessionData.sessionDate ? sessionData.sessionDate + " " + (sessionData.sessionMonth || "September") : "-";
    document.getElementById("confirmTime").textContent = sessionData.sessionTime || "-";
    document.getElementById("confirmPromo").textContent = sessionData.promoCode || "-";
  </script>
</body>
</html>
