<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log In - MentorHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        :root {
            --lime: #a7ed27;
            --lime-dark: #78b91e;
            --cyan: #62c9ec;
            --ink: #151617;
            --soft: #f4fbe8;
            --muted: #68706c;
            --line: #dfead7;
        }

        body {
            min-height: 100vh;
            color: #1b1d1b;
            font-family: "Roboto Slab", serif;
            background: linear-gradient(115deg, rgba(98,201,236,.22), rgba(167,237,39,.18)), var(--soft);
        }

        h1, h2, .navbar-brand, .btn, label {
            font-family: "Montserrat", sans-serif;
        }

        .auth-shell {
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .navbar {
            background: var(--ink);
        }

        .navbar-brand {
            color: var(--lime);
            font-weight: 700;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            margin-right: .45rem;
            border-radius: 8px;
            color: var(--ink);
            background: linear-gradient(135deg, var(--lime), var(--cyan));
        }

        .auth-main {
            display: flex;
            align-items: center;
            padding: 7rem 0 4rem;
        }

        .auth-panel {
            width: min(100%, 520px);
            margin: 0 auto;
            padding: 2.25rem;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fbfff2;
            box-shadow: 0 16px 40px rgba(0,0,0,.12);
        }

        .form-control {
            min-height: 48px;
            border-color: var(--line);
            border-radius: 6px;
        }

        .form-control:focus {
            border-color: var(--lime-dark);
            box-shadow: 0 0 0 .2rem rgba(167,237,39,.25);
        }

        .btn-primary {
            --bs-btn-color: var(--ink);
            --bs-btn-bg: var(--lime);
            --bs-btn-border-color: var(--lime);
            --bs-btn-hover-color: var(--ink);
            --bs-btn-hover-bg: #b9f44d;
            --bs-btn-hover-border-color: #b9f44d;
            min-height: 48px;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .helper-link {
            color: var(--lime-dark);
            font-weight: 700;
            text-decoration: none;
        }

        .helper-link:hover {
            color: var(--ink);
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <nav class="navbar navbar-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html"><span class="brand-mark"><i class="bi bi-link-45deg"></i></span>MentorHub</a>
            </div>
        </nav>

        <main class="auth-main">
            <div class="container">
                <section class="auth-panel" aria-labelledby="login-title">
                    <p class="text-uppercase fw-bold mb-2" style="color: var(--lime-dark); letter-spacing: .1em;">Welcome back</p>
                    <h1 id="login-title" class="h2 fw-bold mb-3">Log in to MentorHub</h1>
                    <p class="mb-4" style="color: var(--muted);">Pick up your mentorship journey where you left off.</p>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Email address</label>
                            <input type="email" class="form-control" id="email" name="email" autocomplete="email" required />
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required />
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember" name="remember" />
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>
                            <a class="helper-link" href="#">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Log In</button>
                        <p class="mt-3 mb-0 text-center" id="loginStatus" aria-live="polite"></p>
                    </form>

                    <p class="mt-4 mb-0 text-center">New here? <a class="helper-link" href="register.html">Create an account</a></p>
                </section>
            </div>
        </main>
    </div>
    <script>
        document.getElementById("loginForm").addEventListener("submit", function (event) {
            event.preventDefault();
            const email = document.getElementById("email").value.trim();
            const displayName = email ? email.split("@")[0] : "User";
            try {
                localStorage.setItem("mentorhubUser", JSON.stringify({
                    name: displayName,
                    email: email
                }));
            } catch (error) {
            }
            document.getElementById("loginStatus").textContent = "Logged in. Taking you back to MentorHub.";
            window.location.href = "index.html?user=" + encodeURIComponent(displayName) + "&email=" + encodeURIComponent(email);
        });
    </script>
</body>
</html>
